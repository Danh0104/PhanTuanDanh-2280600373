<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 450px;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }
        .error-icon i {
            font-size: 32px;
            color: white;
        }
        h1 {
            font-size: 72px;
            font-weight: 900;
            color: #ef4444;
            margin-bottom: 8px;
            line-height: 1;
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }
        p {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 28px;
        }
        .btn-back {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon">
        <i class="fas fa-lock"></i>
    </div>
    <h1>403</h1>
    <h2>Truy cap bi tu choi</h2>
    <p>Ban khong co quyen truy cap trang nay.<br>Vui long lien he quan tri vien neu can ho tro.</p>
    <a href="/products" th:href="@{/products}" class="btn-back">
        <i class="fas fa-arrow-left me-2"></i>Quay lai danh sach san pham
    </a>
</div>
</body>
</html>
