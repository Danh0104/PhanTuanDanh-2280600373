<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary:   #6b5c52;
            --primary-dark: #4a3f37;
            --accent:    #8d7b72;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #6b5c52, #8d7b72, #4a3f37);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-card {
            width: 420px;
            padding: 44px 40px;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 12px 35px rgba(107, 92, 82, 0.35);
        }

        .login-title {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .login-title span {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: #888;
            margin-top: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #fff;
            transition: opacity .2s;
        }

        .btn-login:hover { opacity: .88; color: #fff; }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(107, 92, 82, 0.2);
            border-color: var(--primary);
        }

        .input-group-text {
            border-radius: 8px 0 0 8px;
            background: #f5f0ee;
            color: var(--primary);
            border-color: #dee2e6;
        }

        .input-group .form-control {
            border-radius: 0 8px 8px 0;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        .hint-box {
            background: #f5f0ee;
            border: 1px solid #d8cfc9;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 20px;
        }

        .hint-box strong { color: var(--primary); }
    </style>
</head>
<body>

<div class="login-card">

    <h3 class="login-title">
        <i class="bi bi-bag-heart"></i> Shop Quần Áo
        <span>Vui lòng đăng nhập để tiếp tục</span>
    </h3>

    <!-- Gợi ý tài khoản -->
    <div class="hint-box">
        <i class="bi bi-info-circle-fill text-danger"></i>
        Tài khoản mặc định:<br>
        <strong>Admin:</strong> admin / 123456 &nbsp;|&nbsp;
        <strong>User:</strong> user / 123456
    </div>

    <form th:action="@{/login}" method="post">

        <!-- Thông báo lỗi -->
        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">
            <i class="bi bi-exclamation-triangle-fill"></i>
            Tên đăng nhập hoặc mật khẩu không đúng!
        </div>

        <!-- Thông báo đăng xuất -->
        <div th:if="${param.logout}" class="alert alert-success py-2 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            Đăng xuất thành công!
        </div>

        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" id="username" name="username"
                       class="form-control"
                       placeholder="Nhập tên đăng nhập..."
                       autofocus required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label for="password" class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" id="password" name="password"
                       class="form-control"
                       placeholder="Nhập mật khẩu..." required>
                <button class="btn btn-outline-secondary" type="button"
                        id="togglePassword">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Nút đăng nhập -->
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
        </button>

    </form>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd  = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
