<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CourseHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6d28d9;           /* violet đậm hơn */
            --primary-dark: #5b21b6;
            --primary-gradient: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            --bg-gradient: linear-gradient(135deg, #2e1065 0%, #4c1d95 100%);
            --card-bg: rgba(255, 255, 255, 0.09);
            --text: #f3e8ff;
            --text-muted: #d6bcfa;
            --border: rgba(255,255,255,0.15);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.5), 0 10px 40px rgba(109,40,217,0.2);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .card-body { padding: 3.5rem 2.8rem; }

        .logo-icon {
            font-size: 4.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.2rem;
        }

        h3 {
            font-weight: 800;
            font-size: 2.1rem;
            color: white;
            margin-bottom: 2.8rem;
        }

        .form-floating .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: white;
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            height: auto;
        }

        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(109,40,217,0.3);
            background: rgba(255,255,255,0.12);
        }

        .form-floating label {
            color: var(--text-muted);
            padding: 1.2rem 1.4rem;
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 25px rgba(109,40,217,0.45);
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(109,40,217,0.6);
        }

        .btn-google {
            background: white;
            color: #2d3748;
            border-radius: 14px;
            padding: 1rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .btn-google:hover { background: #f8f9fa; }

        .alert { border-radius: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card-body text-center">
            <i class="fas fa-graduation-cap logo-icon"></i>
            <h3>Chào mừng đến CourseHub</h3>

            <div th:if="${param.error}" class="alert alert-danger">Thông tin đăng nhập không đúng!</div>
            <div th:if="${param.registered}" class="alert alert-success">Đăng ký thành công! Vui lòng đăng nhập.</div>
            <div th:if="${param.logout}" class="alert alert-info">Bạn đã đăng xuất.</div>

            <form th:action="@{/login}" method="post">
                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Tên đăng nhập" required autofocus>
                    <label for="username">Tên đăng nhập</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu" required>
                    <label for="password">Mật khẩu</label>
                </div>
                <button type="submit" class="btn btn-login w-100 mb-4">
                    <i class="fas fa-arrow-right-to-bracket me-2"></i> Đăng nhập
                </button>
            </form>

            <div class="text-muted mb-3">hoặc</div>

            <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 mb-4 d-flex align-items-center justify-content-center">
                <i class="fab fa-google me-2"></i> Đăng nhập bằng Google
            </a>

            <div>
                <span class="text-muted">Chưa có tài khoản? </span>
                <a th:href="@{/register}" style="color: #e9d5ff; text-decoration: none; font-weight: 500;">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
