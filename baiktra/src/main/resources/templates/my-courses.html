<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
        .card-img-top { height: 200px; object-fit: cover; border-radius: 12px 12px 0 0; }
        .badge-credits { background: #667eea; }
        footer { background: #2d3436; color: #b2bec3; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">
                <i class="fas fa-graduation-cap me-2"></i>Course Registration
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="fas fa-home me-1"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/enroll/my-courses}"><i class="fas fa-book me-1"></i>My Courses</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link"><i class="fas fa-user me-1"></i><span sec:authentication="name"></span></span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn nav-link"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4 text-center"><i class="fas fa-book-open me-2"></i>My Enrolled Courses</h2>

        <div class="row" th:if="${#lists.isEmpty(enrollments)}">
            <div class="col-12 text-center py-5">
                <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                <h4 class="text-muted">You haven't enrolled in any courses yet.</h4>
                <a th:href="@{/home}" class="btn btn-primary mt-2">Browse Courses</a>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4 col-md-6 col-sm-12 mb-4" th:each="enrollment : ${enrollments}">
                <div class="card h-100">
                    <img th:src="${enrollment.course.image != null ? enrollment.course.image : 'https://via.placeholder.com/400x200?text=Course'}"
                         class="card-img-top" alt="Course Image">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${enrollment.course.name}">Course Name</h5>
                        <p class="card-text">
                            <span class="badge badge-credits text-white" th:text="${enrollment.course.credits + ' Credits'}"></span>
                        </p>
                        <p class="card-text text-muted">
                            <i class="fas fa-chalkboard-teacher me-1"></i>
                            <span th:text="${enrollment.course.lecturer}">Lecturer</span>
                        </p>
                        <p class="card-text">
                            <small class="text-muted">
                                <i class="fas fa-calendar me-1"></i>Enrolled: <span th:text="${enrollment.enrollDate}"></span>
                            </small>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">Course Registration System &copy; 2026</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
