<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .btn-add { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
        .btn-add:hover { opacity: 0.9; color: white; }
        footer { background: #2d3436; color: #b2bec3; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">
                <i class="fas fa-graduation-cap me-2"></i>Course Registration
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="fas fa-home me-1"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/courses}"><i class="fas fa-cogs me-1"></i>Admin</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn nav-link"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-list me-2"></i>Manage Courses</h2>
            <a th:href="@{/admin/courses/create}" class="btn btn-add">
                <i class="fas fa-plus me-1"></i>Add New Course
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover bg-white rounded shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Credits</th>
                        <th>Lecturer</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course, stat : ${courses}">
                        <td th:text="${stat.index + 1}"></td>
                        <td>
                            <img th:src="${course.image != null ? course.image : 'https://via.placeholder.com/60x40?text=N/A'}"
                                 style="width:60px;height:40px;object-fit:cover;border-radius:4px;" alt="img">
                        </td>
                        <td th:text="${course.name}"></td>
                        <td th:text="${course.credits}"></td>
                        <td th:text="${course.lecturer}"></td>
                        <td th:text="${course.category != null ? course.category.name : 'N/A'}"></td>
                        <td>
                            <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this course?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="d-flex justify-content-center mt-3">
            <ul class="pagination">
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/courses(page=${i})}" th:text="${i + 1}">1</a>
                </li>
            </ul>
        </nav>
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">Course Registration System &copy; 2026</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
