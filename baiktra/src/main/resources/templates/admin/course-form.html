<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
        .btn-save:hover { opacity: 0.9; color: white; }
        .form-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">
                <i class="fas fa-graduation-cap me-2"></i>Course Registration
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card form-card">
                    <div class="card-body p-4">
                        <h3 class="mb-4">
                            <i class="fas fa-book me-2"></i>
                            <span th:text="${course.id != null ? 'Edit Course' : 'Create New Course'}"></span>
                        </h3>

                        <form th:action="@{/admin/courses/save}" method="post" enctype="multipart/form-data" th:object="${course}">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{image}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Course Name</label>
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="Enter course name">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Credits</label>
                                    <input type="number" class="form-control" th:field="*{credits}" required min="1" placeholder="Number of credits">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Lecturer</label>
                                    <input type="text" class="form-control" th:field="*{lecturer}" required placeholder="Lecturer name">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select class="form-select" th:field="*{category.id}">
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Course Image</label>
                                <input type="file" class="form-control" name="imageFile" accept="image/*">
                                <div th:if="${course.image != null}" class="mt-2">
                                    <img th:src="${course.image}" style="max-height:100px;border-radius:8px;" alt="Current image">
                                    <small class="text-muted d-block">Current image (leave empty to keep)</small>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-save">
                                    <i class="fas fa-save me-1"></i>Save Course
                                </button>
                                <a th:href="@{/admin/courses}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
